<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>公共 No.8-14 学習アプリ</title>
    <meta name="theme-color" content="#1f6f68" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="公共 No.8-14" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css?v=4" />
  </head>
  <body>
    <main class="app">
      <section class="print-pane" aria-label="読み込んだ授業プリント">
        <div class="pane-header">
          <div>
            <p class="eyebrow">読み込み済みプリント</p>
            <h1>公共 No.8-14 学習アプリ</h1>
          </div>
          <div class="progress">
            <span id="scoreText">0 / 0</span>
            <span>正解</span>
          </div>
        </div>
        <div class="print-tools">
          <button id="zoomOut" type="button" aria-label="縮小">−</button>
          <button id="zoomIn" type="button" aria-label="拡大">＋</button>
          <button id="prevPrint" type="button" aria-label="前のプリント">‹</button>
          <select id="printPageSelect" aria-label="表示するプリント"></select>
          <button id="nextPrint" type="button" aria-label="次のプリント">›</button>
          <button id="resetQuiz" type="button" aria-label="解答をリセット" title="解答をリセット">解答リセット</button>
        </div>
        <div class="print-frame">
          <img id="printImage" src="./assets/prints/koukyo-08.jpg" alt="公共の授業プリント" />
        </div>
      </section>

      <section class="study-pane" aria-label="問題演習">
        <nav class="tabs" aria-label="学習モード">
          <button class="tab active" data-view="summary" type="button">要点</button>
          <button class="tab" data-view="cards" type="button">暗記</button>
          <button class="tab" data-view="quiz" type="button">問題</button>
        </nav>

        <section id="summaryView" class="view active">
          <h2>プリントの要点</h2>
          <div id="summaryList" class="summary-list"></div>
        </section>

        <section id="cardsView" class="view">
          <h2>暗記カード</h2>
          <div class="card-stage">
            <button id="prevCard" type="button" aria-label="前のカード">‹</button>
            <article id="flashCard" class="flash-card" tabindex="0">
              <p id="cardPrompt"></p>
              <strong id="cardAnswer"></strong>
              <span>クリックで答えを表示</span>
            </article>
            <button id="nextCard" type="button" aria-label="次のカード">›</button>
          </div>
          <p id="cardCount" class="card-count"></p>
        </section>

        <section id="quizView" class="view">
          <div class="quiz-head">
            <div>
              <p class="eyebrow">自動作成問題</p>
              <h2>穴埋め・選択・記述</h2>
            </div>
            <select id="categoryFilter" aria-label="単元を選ぶ">
              <option value="all">全範囲</option>
            </select>
          </div>
          <div id="questionList" class="question-list"></div>
        </section>
      </section>
    </main>

    <script src="./app.js?v=4"></script>
  </body>
</html>
